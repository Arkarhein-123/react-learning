<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         #box {
             position: relative;
             width: 800px;
             height: 30px;
             padding: 10px;
             background: skyblue;
             border: 5px solid darkblue;
}
         #ball {
             position: absolute;
             left: 0;
             top: 12px;
             width: 30px;
             height: 30px;
             border-radius: 30px;
             background-color: red;
}
button{
    margin: 10px 10px 20px 5px;
    padding: 20px 30px;
    background-color: rgb(249, 162, 0);
    color: black;
    border-radius: 10px;
    border: none;
    font-size: large;
}
    </style>
</head>
<body>
    <div id="box">
        <div id="ball"></div>
    </div>

    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>

    <script src="./app.js"></script>
</body>
</html>
